services:
  init:
    build:
      context: .
      dockerfile: Dockerfile.init
    restart: "no"
    environment:
      - V2RAY_UUID=${V2RAY_UUID}
      - V2RAY_HOST=${V2RAY_HOST:-}
      - FTP_HOST=${FTP_HOST}
      - FTP_USER=${FTP_USER}
      - FTP_PASS=${FTP_PASS}
      - FTP_PATH=${FTP_PATH}
    volumes:
      - v2ray-cfg:/cfg

  v2ray:
    image: v2fly/v2fly-core
    pull_policy: always
    container_name: v2ray-all
    restart: always
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "53217:53217/tcp"
      - "53218:53218/tcp"
      - "53219:53219/tcp"
      - "53220:53220/tcp"
      - "53220:53220/udp"
      - "53221:53221/udp"
    volumes:
      - v2ray-cfg:/cfg
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for /cfg/server.json..."
        i=0
        while [ ! -s /cfg/server.json ]; do
          i=$$((i+1))
          if [ $$i -ge 30 ]; then
            echo "ERROR: /cfg/server.json still empty after 30s"
            exit 1
          fi
          sleep 1
        done
        echo "Config found, starting v2ray"
        exec v2ray run -config /cfg/server.json -format jsonv5

volumes:
  v2ray-cfg:
