services:
  init:
    image: alpine
    restart: "no"
    environment:
      - V2RAY_UUID
      - V2RAY_HOST
      - FTP_HOST
      - FTP_USER
      - FTP_PASS
      - FTP_PATH
    volumes:
      - ./templates:/templates:ro
      - v2ray-cfg:/cfg
    command:
      - sh
      - -c
      - |
        # ── Generate server.json ──────────────────────────────────────────────
        if [ -f /cfg/server.json ] && [ -s /cfg/server.json ]; then
          echo "server.json already exists, skipping."
        elif [ -z "$V2RAY_UUID" ]; then
          echo "ERROR: V2RAY_UUID is required" >&2; exit 1
        else
          sed "s/00000000-0000-0000-0000-000000000000/$V2RAY_UUID/g" \
            /templates/server.template.json > /cfg/server.json.tmp \
            && mv /cfg/server.json.tmp /cfg/server.json \
            && echo "Generated server.json with UUID $V2RAY_UUID" \
            || { rm -f /cfg/server.json.tmp; echo "ERROR: failed to generate server.json" >&2; exit 1; }
        fi

        # ── Upload client configs to FTP (if FTP_HOST is set) ────────────────
        if [ -n "$FTP_HOST" ]; then
          apk add --no-cache curl >/dev/null 2>&1
          HOST="${V2RAY_HOST:-YOUR_SERVER_IP}"
          FTP_BASE="ftp://$FTP_HOST${FTP_PATH:-/}"
          for proto in vless vmess trojan client; do
            tmpl="/templates/${proto}.template.json"
            [ -f "$tmpl" ] || continue
            out="/tmp/${proto}.json"
            sed -e "s/00000000-0000-0000-0000-000000000000/$V2RAY_UUID/g" \
                -e "s/YOUR_SERVER_IP/$HOST/g" \
                "$tmpl" > "$out"
            curl -s -T "$out" "${FTP_BASE}${proto}.json" \
              --user "$FTP_USER:$FTP_PASS" \
              && echo "Uploaded ${proto}.json to FTP" \
              || echo "WARNING: failed to upload ${proto}.json"
          done
        fi

  v2ray:
    image: v2fly/v2fly-core
    container_name: v2ray-all
    restart: always
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "53217:53217/tcp"
      - "53218:53218/tcp"
      - "53219:53219/tcp"
    volumes:
      - v2ray-cfg:/cfg
    command: run -config /cfg/server.json

volumes:
  v2ray-cfg:
