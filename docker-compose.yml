services:
  init:
    image: node:22-alpine
    restart: "no"
    environment:
      - V2RAY_UUID
      - V2RAY_HOST
      - FTP_HOST
      - FTP_USER
      - FTP_PASS
      - FTP_PATH
    volumes:
      - v2ray-cfg:/cfg
    configs:
      - source: init_script
        target: /init.mjs
      - source: server_template
        target: /templates/server.template.json
      - source: vless_template
        target: /templates/vless.template.json
      - source: vmess_template
        target: /templates/vmess.template.json
      - source: trojan_template
        target: /templates/trojan.template.json
      - source: client_template
        target: /templates/client.template.json
    command: node /init.mjs

  v2ray:
    image: v2fly/v2fly-core
    container_name: v2ray-all
    restart: always
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "53217:53217/tcp"
      - "53218:53218/tcp"
      - "53219:53219/tcp"
    volumes:
      - v2ray-cfg:/cfg
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for /cfg/server.json..."
        i=0
        while [ ! -s /cfg/server.json ]; do
          i=$((i+1))
          if [ $i -ge 30 ]; then
            echo "ERROR: /cfg/server.json still empty after 30s"
            exit 1
          fi
          sleep 1
        done
        echo "Config found, starting v2ray"
        exec v2ray run -config /cfg/server.json

volumes:
  v2ray-cfg:

configs:
  init_script:
    file: ./init.mjs
  server_template:
    file: ./templates/server.template.json
  vless_template:
    file: ./templates/vless.template.json
  vmess_template:
    file: ./templates/vmess.template.json
  trojan_template:
    file: ./templates/trojan.template.json
  client_template:
    file: ./templates/client.template.json
